name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install flake8
      - run: flake8 bot_telegram.py --max-line-length=100

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: |
          if grep -r "password\|secret\|api_key\|token" --include="*.py" . | grep -v "TELEGRAM_BOT_TOKEN\|TELEGRAM_CHAT_ID\|os.environ"; then
            echo "❌ Hardcoded credentials found!"
            exit 1
          fi
          echo "✅ No hardcoded credentials"
